<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Glyph Launching Timeline</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23222'/%3E%3Ctext x='16' y='23' text-anchor='middle' font-family='SF Pro Display,Helvetica,Arial,sans-serif' font-size='22' font-weight='700' fill='%23fff'%3EG%3C/text%3E%3C/svg%3E">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,'Pretendard','SF Pro Display',sans-serif;background:#e8e8ed;color:#333;height:100vh;overflow:hidden;position:relative}
body::before{content:'';position:fixed;inset:0;z-index:0;background:
  radial-gradient(ellipse 60% 50% at 15% 25%, rgba(120,140,220,.12) 0%, transparent 50%),
  radial-gradient(ellipse 50% 40% at 80% 20%, rgba(180,140,210,.09) 0%, transparent 45%),
  radial-gradient(ellipse 55% 45% at 60% 75%, rgba(100,180,200,.08) 0%, transparent 50%),
  radial-gradient(ellipse 70% 50% at 35% 80%, rgba(200,160,180,.07) 0%, transparent 45%);
  pointer-events:none}
.app{display:flex;height:100vh;position:relative;z-index:1}

/* ── Neumorphic Tokens ── */
:root{
  --glass:rgba(255,255,255,.38);
  --glass-strong:rgba(255,255,255,.52);
  --glass-subtle:rgba(255,255,255,.22);
  --glass-blur:blur(40px) saturate(1.8);
  --glass-blur-sm:blur(24px) saturate(1.6);
  --glass-border:1px solid rgba(255,255,255,.45);
  --glass-border-light:1px solid rgba(255,255,255,.55);
  --glass-highlight:inset 0 1px 0 rgba(255,255,255,.5), inset 1px 0 0 rgba(255,255,255,.3);
  --glass-shadow:0 4px 20px rgba(0,0,0,.06), 0 1px 3px rgba(0,0,0,.04);
  --glass-shadow-lg:0 8px 32px rgba(0,0,0,.08), 0 2px 6px rgba(0,0,0,.04);
  --accent:#6366f1;
  --accent-hover:#5558e6;
  --accent-glow:rgba(99,102,241,.22);
  --text-primary:#1a1a1a;
  --text-secondary:#4a4a4a;
  --text-muted:#8a8a8a;
}

/* ── Sidebar ── */
.sidebar{width:300px;background:var(--glass-strong);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border-right:var(--glass-border-light);overflow:hidden;flex-shrink:0;display:flex;flex-direction:column;box-shadow:var(--glass-highlight), 1px 0 0 rgba(255,255,255,.3)}
.sb-scroll{flex:1;overflow-y:auto;overflow-x:hidden;min-height:0;-webkit-overflow-scrolling:touch}
.sidebar-header{padding:20px 16px 14px;border-bottom:1px solid rgba(0,0,0,.05)}
.sidebar-header h1{font-size:19px;font-weight:700;color:var(--text-primary);margin-bottom:3px}
.sidebar-header p{font-size:13px;color:var(--text-muted)}
.progress-wrap{margin-top:10px;display:flex;align-items:center;gap:10px}
.progress-bar-bg{flex:1;background:rgba(0,0,0,.06);border-radius:20px;height:6px;overflow:hidden;border:1px solid rgba(255,255,255,.4)}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#6366f1,#a78bfa);border-radius:20px;transition:width .4s}
.progress-pct{font-size:12px;color:var(--text-secondary);min-width:36px;text-align:right}

.sb-title{font-size:11px;color:var(--text-muted);text-transform:uppercase;letter-spacing:.8px;padding:14px 16px 4px}
.sb-toggle{cursor:pointer;user-select:none;display:flex;align-items:center;gap:0;transition:color .15s;padding:14px 16px 4px;position:relative}
.sb-toggle:hover{color:var(--text-secondary)}
.sb-toggle-arrow{font-size:9px;transition:transform .2s;display:inline-flex;align-items:center;justify-content:center;width:18px;height:18px;border-radius:4px;opacity:0;transition:opacity .15s, transform .2s;margin-left:-2px;margin-right:2px;flex-shrink:0}
.sb-toggle:hover .sb-toggle-arrow{opacity:1}
.sb-toggle-arrow:hover{background:rgba(0,0,0,.04)}
.sb-toggle.collapsed .sb-toggle-arrow{transform:rotate(-90deg);opacity:1}
.sb-collapsible{overflow:hidden;transition:max-height .3s ease, opacity .25s ease;max-height:800px;opacity:1}
.sb-collapsible.collapsed{max-height:0!important;opacity:0;pointer-events:none}
.sb-list{padding:0 6px 4px}
.sb-item{padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;border-radius:10px;transition:all .18s;font-size:13px;color:var(--text-secondary);border-left:3px solid transparent}
.sb-item:hover{background:rgba(255,255,255,.35)}
.sb-item.active{background:var(--glass);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);color:var(--text-primary);border-left-color:var(--accent);box-shadow:var(--glass-highlight), var(--glass-shadow)}
.sb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.sb-count{margin-left:auto;font-size:11px;color:var(--text-muted)}
.sb-avatar{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff;flex-shrink:0}
.sb-close-btn{background:none;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;transition:all .15s;opacity:0}
.sidebar:hover .sb-close-btn{opacity:1}
.sb-close-btn:hover{background:rgba(0,0,0,.05);color:var(--text-primary)}
.sidebar.hiding{left:-300px}
.sidebar{transition:left .25s ease,width .25s ease}
.sidebar.hidden{width:0;min-width:0;overflow:hidden;border:none;padding:0}
.sb-open-btn{position:fixed;top:12px;left:8px;z-index:20;width:28px;height:28px;border-radius:6px;background:var(--glass);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);border:var(--glass-border);color:var(--text-muted);font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;transition:all .15s;box-shadow:var(--glass-highlight),var(--glass-shadow)}
.sb-open-btn:hover{background:var(--glass-strong);color:var(--text-primary)}
.sb-open-btn.show{display:flex}
.sb-bottom{padding:8px 10px;border-top:1px solid rgba(0,0,0,.05);flex-shrink:0}
.sb-bottom .btn{width:100%;justify-content:center}

/* ── Main ── */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;background:transparent}
.toolbar{padding:10px 20px;border-bottom:1px solid rgba(0,0,0,.04);display:flex;align-items:center;gap:10px;background:var(--glass-strong);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);flex-shrink:0;box-shadow:var(--glass-highlight);transition:padding-left .25s ease}
.sidebar.hidden~.main .toolbar{padding-left:44px}
.view-toggle{display:flex;background:var(--glass-subtle);border-radius:12px;overflow:hidden;border:var(--glass-border);box-shadow:var(--glass-highlight)}
.view-btn{padding:7px 16px;font-size:13px;border:none;background:none;color:var(--text-muted);cursor:pointer;transition:all .2s}
.view-btn.active{background:var(--accent);color:#fff;border-radius:10px;box-shadow:0 2px 10px var(--accent-glow), var(--glass-highlight)}
.toolbar-spacer{flex:1}
.btn{padding:7px 14px;font-size:13px;border:var(--glass-border);background:var(--glass);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);color:var(--text-secondary);border-radius:12px;cursor:pointer;transition:all .18s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;box-shadow:var(--glass-highlight), var(--glass-shadow)}
.btn:hover{background:var(--glass-strong);color:var(--text-primary);box-shadow:var(--glass-highlight), var(--glass-shadow-lg)}
.btn:active{background:var(--glass-subtle);box-shadow:inset 0 1px 3px rgba(0,0,0,.06)}
.btn-primary{background:linear-gradient(135deg,#6366f1,#818cf8);border:1px solid rgba(255,255,255,.25);color:#fff;box-shadow:0 2px 12px var(--accent-glow), var(--glass-highlight)}
.btn-primary:hover{background:linear-gradient(135deg,#5558e6,#7578f5);box-shadow:0 4px 18px var(--accent-glow), var(--glass-highlight)}
.btn-primary:active{opacity:.9}
.btn-sm{padding:4px 8px;font-size:10px}
.zoom-controls{display:flex;align-items:center;gap:4px;background:var(--glass-subtle);border-radius:12px;padding:2px;border:var(--glass-border);box-shadow:var(--glass-highlight)}
.zoom-btn{width:26px;height:26px;border:none;background:none;color:var(--text-muted);cursor:pointer;border-radius:8px;font-size:14px;display:flex;align-items:center;justify-content:center;transition:all .12s}
.zoom-btn:hover{background:var(--glass);color:var(--text-primary)}
.zoom-btn:active{background:var(--glass-subtle)}
.zoom-label{font-size:12px;color:var(--text-muted);min-width:28px;text-align:center}

.content{flex:1;overflow:auto;position:relative}

/* ── Gantt ── */
.gantt{min-width:100%;position:relative}
.gantt-header{position:sticky;top:0;z-index:10;background:var(--glass-strong);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);border-bottom:1px solid rgba(0,0,0,.04);height:36px;box-shadow:var(--glass-highlight)}
.gantt-header-left{position:sticky;left:0;z-index:20;background:var(--glass-strong);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);box-shadow:var(--glass-highlight), 3px 0 12px rgba(0,0,0,.04);width:var(--left-w,360px);height:100%;padding:0 16px;font-size:12px;color:var(--text-muted);display:flex;align-items:center;gap:12px;border-right:var(--glass-border-light)}
.gantt-header-right{position:absolute;left:var(--left-w,360px);top:0;height:100%;display:flex}
.gantt-col-header{text-align:center;font-size:12px;color:var(--text-muted);padding:8px 0;border-right:1px solid rgba(0,0,0,.03);flex-shrink:0}
.gantt-col-header.today{color:#ef4444;font-weight:600}
.gantt-col-header.weekend{color:#b8b8c4}

.gantt-group{border-bottom:1px solid rgba(0,0,0,.04);position:relative}
.gantt-group-header{display:flex;align-items:center;padding:0 16px;height:40px;cursor:pointer;user-select:none;background:var(--glass-subtle);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);position:sticky;left:0;z-index:15;width:fit-content;min-width:var(--left-w,360px);box-shadow:var(--glass-highlight)}
.gantt-group-header::before{content:'';position:absolute;top:0;left:0;right:-9999px;bottom:0;background:rgba(255,255,255,.22);z-index:-1}
.gantt-group-header:hover{background:var(--glass)}
.gantt-toggle{font-size:9px;color:var(--text-muted);transition:transform .2s;margin-right:8px;width:14px}
.gantt-toggle.collapsed{transform:rotate(-90deg)}
.gantt-group-color{width:3px;height:20px;border-radius:2px;margin-right:8px}
.gantt-group-name{font-size:14px;font-weight:600;color:var(--text-primary)}
.gantt-group-info{font-size:12px;color:var(--text-muted);margin-left:8px}

.gantt-row{position:relative;height:38px;transition:background .12s}
.gantt-row:hover{background:rgba(0,0,0,.015)}
.gantt-row:hover .gantt-row-left{background:var(--glass-strong)}
.gantt-row-left{position:sticky;left:0;z-index:10;background:var(--glass);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);box-shadow:var(--glass-highlight), 3px 0 12px rgba(0,0,0,.04);width:var(--left-w,360px);height:100%;display:flex;align-items:center;gap:5px;padding:0 10px 0 16px;border-right:var(--glass-border-light);overflow:hidden}
.gantt-check{width:16px;height:16px;border-radius:5px;border:1.5px solid rgba(0,0,0,.1);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .18s;flex-shrink:0;background:var(--glass);box-shadow:var(--glass-highlight)}
.gantt-check:hover{border-color:var(--accent);background:var(--glass-strong)}
.gantt-check.done{background:linear-gradient(135deg,#6366f1,#818cf8);border-color:rgba(255,255,255,.25);box-shadow:0 2px 6px var(--accent-glow), var(--glass-highlight)}
.gantt-check.done::after{content:'✓';font-size:10px;color:#fff}
.gantt-label{font-size:14px;color:var(--text-primary);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.gantt-label.done-text{text-decoration:line-through;color:#b0b0bb}
.gantt-assignee-badge{min-width:24px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:9px;font-weight:600;color:#fff;flex-shrink:0;padding:0 4px}
.gantt-row-right{position:absolute;left:var(--left-w,360px);top:0;height:100%;overflow:visible}
.gantt-bar{position:absolute;height:22px;top:8px;border-radius:8px;cursor:pointer;transition:all .18s;opacity:.92;z-index:1;display:flex;align-items:center;justify-content:center;font-size:11px;color:rgba(255,255,255,.95);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:0 6px;box-shadow:0 2px 10px rgba(0,0,0,.1), inset 0 1px 0 rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.2)}
.gantt-bar:hover{opacity:1;box-shadow:0 4px 16px rgba(0,0,0,.14), inset 0 1px 0 rgba(255,255,255,.35);transform:translateY(-1px)}
.gantt-bar.done{opacity:.35}
.gantt-bar .resize-handle{position:absolute;top:0;width:5px;height:100%;cursor:ew-resize;z-index:3}
.gantt-bar .resize-handle.l{left:0;border-radius:8px 0 0 8px}
.gantt-bar .resize-handle.r{right:0;border-radius:0 8px 8px 0}
.gantt-bar .resize-handle:hover{background:rgba(255,255,255,.2)}
.gantt-grid-line{position:absolute;top:0;bottom:0;width:1px;background:rgba(0,0,0,.025);pointer-events:none}
.gantt-today-line{position:absolute;top:0;bottom:0;width:1px;background:#ef4444;z-index:18;pointer-events:none;opacity:.45}

/* Row add */
.gantt-add-row{height:30px;display:flex;align-items:center;padding:0 16px 0 36px;position:sticky;left:0;z-index:10;background:var(--glass);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur)}
.add-btn{font-size:12px;color:var(--text-muted);cursor:pointer;background:var(--glass-subtle);border:1px dashed rgba(0,0,0,.08);padding:4px 12px;border-radius:10px;transition:all .18s;box-shadow:var(--glass-highlight)}
.add-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--glass)}
.add-btn:active{background:var(--glass-subtle)}

/* ── List View ── */
.list-group{border:var(--glass-border);border-radius:16px;margin:8px 20px;overflow:hidden;background:var(--glass);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);box-shadow:var(--glass-highlight), var(--glass-shadow)}
.list-group-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:var(--glass-subtle);cursor:pointer;user-select:none;box-shadow:var(--glass-highlight)}
.list-group-header:hover{background:var(--glass)}
.list-tasks{overflow:hidden;transition:max-height .25s ease}
.list-tasks.collapsed{max-height:0!important;overflow:hidden}
.list-row{display:grid;grid-template-columns:18px 1fr 72px 120px 60px;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid var(--border-subtle);cursor:pointer;transition:all .12s}
.list-row:hover{background:rgba(0,0,0,.015)}
.list-name{font-size:14px;display:flex;align-items:center;gap:6px;overflow:hidden}
.list-name.done-text span{text-decoration:line-through;color:#b0b0bb}
.list-assignee{font-size:12px;display:flex;align-items:center;gap:4px;color:var(--text-secondary)}
.list-dates{font-size:12px;color:var(--text-muted);font-variant-numeric:tabular-nums}
.list-status{font-size:11px;padding:3px 8px;border-radius:8px;text-align:center;border:none}
.st-not-started{background:rgba(0,0,0,.04);color:#999}
.st-in-progress{background:rgba(99,102,241,.1);color:#6366f1}
.st-done{background:rgba(34,197,94,.1);color:#16a34a}
.st-blocked{background:rgba(239,68,68,.1);color:#ef4444}

/* ── Calendar View ── */
.cal-wrap{padding:16px 20px;overflow:hidden;height:100%;display:flex;flex-direction:column;min-height:0}
.cal-nav{display:flex;align-items:center;gap:12px;margin-bottom:12px;flex-shrink:0}
.cal-nav-btn{width:32px;height:32px;border:var(--glass-border);background:var(--glass);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);border-radius:10px;cursor:pointer;font-size:16px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;transition:all .15s;box-shadow:var(--glass-highlight)}
.cal-nav-btn:hover{background:var(--glass-strong);color:var(--text-primary)}
.cal-month{font-size:20px;font-weight:700;color:var(--text-primary);min-width:140px;text-align:center}
.cal-today-btn{font-size:12px;padding:5px 14px;border:var(--glass-border);background:var(--glass);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:10px;cursor:pointer;color:var(--text-secondary);transition:all .15s;box-shadow:var(--glass-highlight)}
.cal-today-btn:hover{background:var(--glass-strong);color:var(--accent)}
.cal-table{flex:1;display:flex;flex-direction:column;background:var(--glass);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);border:var(--glass-border);border-radius:14px;overflow:hidden;box-shadow:var(--glass-shadow);min-height:0}
.cal-dow-row{display:grid;grid-template-columns:repeat(7,1fr);border-bottom:1px solid rgba(0,0,0,.06);flex-shrink:0}
.cal-dow{text-align:center;font-size:12px;font-weight:600;color:var(--text-muted);padding:10px 0;text-transform:uppercase;letter-spacing:.5px}
.cal-dow.weekend{color:#c0c0c8}
.cal-body{flex:1;overflow-y:auto;overflow-x:hidden;scroll-snap-type:y proximity;-webkit-overflow-scrolling:touch}
.cal-week-wrap{display:flex;flex-direction:column;border-bottom:1px solid rgba(0,0,0,.04);position:relative;min-height:160px;scroll-snap-align:start}
.cal-week-wrap:last-child{border-bottom:none}
.cal-week{display:grid;grid-template-columns:repeat(7,1fr);flex-shrink:0}
.cal-day{border-right:1px solid rgba(0,0,0,.03);padding:6px 10px;cursor:pointer;transition:background .12s;min-height:28px}
.cal-day:last-child{border-right:none}
.cal-day:hover{background:rgba(99,102,241,.04)}
.cal-day.other-month{opacity:.3}
.cal-day.today{background:rgba(239,68,68,.05)}
.cal-day.weekend{background:rgba(0,0,0,.012)}
.cal-date{font-size:14px;font-weight:600;color:var(--text-secondary);display:inline-block}
.cal-day.today .cal-date{color:#fff;background:#ef4444;width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px}
.cal-day.other-month .cal-date{color:#bbb}
.cal-lanes{flex:1;padding:2px 0;overflow:hidden;background:repeating-linear-gradient(90deg,transparent,transparent calc(100%/7 - 1px),rgba(0,0,0,.03) calc(100%/7 - 1px),rgba(0,0,0,.03) calc(100%/7))}
.cal-event-lane{display:grid;grid-template-columns:repeat(7,1fr);height:26px;margin-bottom:2px}
.cal-bar{border-radius:5px;color:#fff;font-size:12px;font-weight:500;padding:0 6px;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;height:24px;transition:all .15s;box-shadow:0 1px 3px rgba(0,0,0,.1);border:1px solid rgba(255,255,255,.18);margin:0 1px}
.cal-bar:hover{box-shadow:0 2px 8px rgba(0,0,0,.16);transform:translateY(-1px);z-index:2}
.cal-bar.done{opacity:.3;text-decoration:line-through}
.cal-bar.cont-left{border-top-left-radius:0;border-bottom-left-radius:0;margin-left:0;border-left:none}
.cal-bar.cont-right{border-top-right-radius:0;border-bottom-right-radius:0;margin-right:0;border-right:none}
.cal-more-row{display:grid;grid-template-columns:repeat(7,1fr);height:18px;flex-shrink:0}
.cal-more{font-size:11px;color:var(--text-muted);text-align:center;cursor:pointer;border-radius:4px;line-height:18px}
.cal-more:hover{background:rgba(99,102,241,.06);color:var(--accent)}

/* ── Modal ── */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.15);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.modal-bg.show{display:flex}
.modal{background:var(--glass-strong);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:var(--glass-border-light);border-radius:20px;width:440px;max-height:80vh;overflow-y:auto;box-shadow:var(--glass-highlight), 0 24px 64px rgba(0,0,0,.1)}
.modal h3{font-size:17px;font-weight:600;color:var(--text-primary);flex:1}
.modal-top{padding:18px 20px 0;display:flex;align-items:center}
.modal-x{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:4px;transition:color .12s}
.modal-x:hover{color:var(--text-primary)}
.modal-body{padding:16px 20px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px}
.fld input,.fld select,.fld textarea{width:100%;padding:8px 12px;background:var(--glass-subtle);border:var(--glass-border);border-radius:12px;color:var(--text-primary);font-size:14px;outline:none;transition:all .18s;box-shadow:var(--glass-highlight)}
.fld input:focus,.fld select:focus,.fld textarea:focus{border-color:var(--accent);box-shadow:var(--glass-highlight), 0 0 0 3px var(--accent-glow);background:var(--glass-strong)}
.fld textarea{resize:vertical;min-height:50px}
.fld-row{display:flex;gap:10px}
.fld-row .fld{flex:1}
.modal-foot{padding:0 20px 18px;display:flex;gap:8px;justify-content:flex-end}
.btn-del{background:rgba(239,68,68,.06);border:1px solid rgba(239,68,68,.2);color:#ef4444;margin-right:auto}
.btn-del:hover{background:rgba(239,68,68,.12);border-color:#ef4444}


/* Tooltip */
.tip{position:fixed;background:var(--glass-strong);backdrop-filter:var(--glass-blur);-webkit-backdrop-filter:var(--glass-blur);border:var(--glass-border-light);border-radius:14px;padding:10px 14px;z-index:50;pointer-events:none;display:none;box-shadow:var(--glass-highlight), var(--glass-shadow-lg);max-width:260px}
.tip.show{display:block}
.tip-title{font-size:14px;font-weight:600;color:var(--text-primary);margin-bottom:5px}
.tip-row{font-size:12px;color:var(--text-secondary);margin-bottom:2px}
.tip-row b{color:var(--text-muted);margin-right:4px}

/* Drag reorder */
.gantt-row.dragging{opacity:.4}
.gantt-row.drag-over-top{box-shadow:inset 0 2px 0 var(--accent)}
.gantt-row.drag-over-bottom{box-shadow:inset 0 -2px 0 var(--accent)}
.gantt-drag-handle{width:16px;cursor:grab;display:flex;align-items:center;justify-content:center;color:#c0c0c8;font-size:11px;flex-shrink:0;user-select:none}
.gantt-drag-handle:hover{color:#888}
.gantt-drag-handle:active{cursor:grabbing}
.list-row.dragging{opacity:.4}
.list-row.drag-over-top{box-shadow:inset 0 2px 0 var(--accent)}
.list-row.drag-over-bottom{box-shadow:inset 0 -2px 0 var(--accent)}

/* Sidebar toggle */
.sidebar-toggle{display:none;position:fixed;top:12px;left:12px;z-index:60;width:32px;height:32px;border-radius:10px;background:var(--glass);backdrop-filter:var(--glass-blur-sm);-webkit-backdrop-filter:var(--glass-blur-sm);border:var(--glass-border);color:var(--text-secondary);font-size:16px;cursor:pointer;align-items:center;justify-content:center;box-shadow:var(--glass-highlight), var(--glass-shadow)}
.sidebar-toggle:hover{background:var(--glass-strong);color:var(--text-primary)}
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.08);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:29}

/* ── Responsive ── */
@media(max-width:1024px){
  .sidebar{position:fixed;left:-300px;top:0;bottom:0;z-index:30;transition:left .25s ease}
  .sidebar.open{left:0}
  .sidebar-toggle{display:flex}
  .sidebar-overlay.show{display:block;z-index:29}
  .toolbar{padding-left:52px}
  .gantt-header-left,.gantt-row-left{flex:0 0 220px}
  .gantt-row-left{padding:0 8px 0 20px}
  .gantt-group-header{padding:0 8px}
  .gantt-add-row{padding:0 8px 0 20px}
  .toolbar .btn:not(.view-btn):not(.zoom-btn):not(.btn-primary){font-size:0;padding:6px 8px}
  .toolbar .btn:not(.view-btn):not(.zoom-btn):not(.btn-primary)::before{font-size:11px}
  #btnExpandAll{font-size:0!important}#btnExpandAll::before{content:'펼침';font-size:10px}
  #btnCollapseAll{font-size:0!important}#btnCollapseAll::before{content:'접기';font-size:10px}
  #btnExport{display:none}
}
@media(max-width:600px){
  .gantt-header-left,.gantt-row-left{flex:0 0 160px}
  .gantt-row-left{padding:0 6px 0 14px;gap:4px}
  .gantt-label{font-size:11px}
  .toolbar{gap:4px;padding:8px 8px 8px 44px;flex-wrap:wrap}
  .zoom-controls{order:-1}
  .view-toggle{order:-2}
  .list-group{margin:6px 8px}
  .list-row{grid-template-columns:18px 1fr 60px 50px;gap:4px;padding:6px 8px}
  .list-dates{display:none}
}

/* Scrollbar */
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.1);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.18)}
</style>

// UNDO SYSTEM (Cmd+Z / Ctrl+Z)
// ═══════════════════════════════════════
const undoStack = [];
const MAX_UNDO = 50;

function pushUndo() {
  undoStack.push({
    tasks: JSON.parse(JSON.stringify(tasks)),
    assignees: [...assignees],
    categories: JSON.parse(JSON.stringify(categories)),
    nextId: nextId
  });
  if (undoStack.length > MAX_UNDO) undoStack.shift();
}

async function undo() {
  if (!undoStack.length) return;
  const snap = undoStack.pop();
  const oldTaskIds = new Set(tasks.map(t => t.id));
  const newTaskIds = new Set(snap.tasks.map(t => t.id));

  tasks = snap.tasks;
  assignees = snap.assignees;
  categories = snap.categories || categories;
  nextId = snap.nextId;
  rebuildCatMaps();
  render();

  // Sync restored state to Supabase
  try {
    // Delete tasks that were added after snapshot
    const toDelete = [...oldTaskIds].filter(id => !newTaskIds.has(id));
    for (const id of toDelete) await sb.from('timeline_tasks').delete().eq('id', id);
    // Upsert all restored tasks
    for (const t of tasks) await saveTask(t, true);
    // Restore assignees & categories
    await saveAssignees();
    await saveCategories();
  } catch (e) { console.error('undo sync error:', e); }

  showUndoToast();
}

function showUndoToast() {
  let toast = document.getElementById('undoToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'undoToast';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(30,30,40,.92);backdrop-filter:blur(16px);color:#fff;padding:10px 20px;border-radius:10px;font-size:12px;opacity:0;transition:all .3s;z-index:9999;pointer-events:none;border:1px solid rgba(255,255,255,.08)';
    document.body.appendChild(toast);
  }
  toast.textContent = '↩ 실행취소 완료';
  toast.style.opacity = '1';
  toast.style.transform = 'translateX(-50%) translateY(0)';
  clearTimeout(toast._t);
  toast._t = setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateX(-50%) translateY(20px)'; }, 1500);
}

document.addEventListener('keydown', e => {
  if ((e.metaKey || e.ctrlKey) && e.key === 'z' && !e.shiftKey) {
    e.preventDefault();
    undo();
  }
});

async function saveTask(task, updateOrder) {
  try {
    const row = {
      id: task.id, name: task.name, cat: task.cat, assignee: task.assignee,
      start_date: task.start, end_date: task.end,
      status: task.status, note: task.note || '', cost: task.cost || 0
    };
    if (updateOrder) {
      const idx = tasks.indexOf(task);
      row.sort_order = idx >= 0 ? idx : tasks.length;
    }
    const { error } = await sb.from('timeline_tasks').upsert(row, { onConflict: 'id' });
    if (error) throw error;
  } catch (e) {
    console.error('saveTask error:', e);
  }
}

// ═══════════════════════════════════════
// GANTT COLUMNS
// ═══════════════════════════════════════
function getLeftW() {
  return window.innerWidth <= 600 ? 160 : (window.innerWidth <= 1024 ? 220 : 360);
}

function getColumns() {
  const z = ZOOM_LEVELS[zoomIdx];
  const cols = [];
  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  if (z.unit === 'month') {
    let d = new Date(TL_START);
    while (d < TL_END) {
      const start = new Date(d);
      const end = new Date(d.getFullYear(), d.getMonth()+1, 0);
      const mEnd = end > TL_END ? TL_END : end;
      const days = Math.ceil((mEnd - start) / 864e5) + 1;
      const MN = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
      const isToday = today.getFullYear()===d.getFullYear() && today.getMonth()===d.getMonth();
      cols.push({ label: MN[d.getMonth()], days, startOff: dayOff(start.toISOString().slice(0,10)), isToday, isWeekend:false });
      d = new Date(d.getFullYear(), d.getMonth()+1, 1);
    }
  } else if (z.unit === 'biweek') {
    let d = new Date(TL_START);
    while (d < TL_END) {
      const start = new Date(d);
      const half = new Date(d); half.setDate(half.getDate()+13);
      const end = half > TL_END ? TL_END : half;
      const days = Math.ceil((end - start) / 864e5) + 1;
      const label = `${start.getMonth()+1}/${start.getDate()}~${end.getMonth()+1}/${end.getDate()}`;
      const isToday = today >= start && today <= end;
      cols.push({ label, days, startOff: dayOff(start.toISOString().slice(0,10)), isToday, isWeekend:false });
      d = new Date(end); d.setDate(d.getDate()+1);
    }
  } else if (z.unit === 'week') {
    let d = new Date(TL_START);
    // Align to Monday
    const dow = d.getDay(); if (dow !== 1) { d.setDate(d.getDate() - (dow === 0 ? 6 : dow - 1)); }
    while (d < TL_END) {
      const start = new Date(d < TL_START ? TL_START : d);
      const wEnd = new Date(d); wEnd.setDate(wEnd.getDate()+6);
      const end = wEnd > TL_END ? TL_END : wEnd;
      const days = Math.ceil((end - start) / 864e5) + 1;
      const label = `${start.getMonth()+1}/${start.getDate()}~${end.getMonth()+1}/${end.getDate()}`;
      const isToday = today >= start && today <= end;
      cols.push({ label, days, startOff: dayOff(start.toISOString().slice(0,10)), isToday, isWeekend:false });
      d.setDate(d.getDate()+7);
    }
  } else { // day
    let d = new Date(TL_START);
    while (d < TL_END) {
      const ds = d.toISOString().slice(0,10);
      const dow = d.getDay();
      const isWe = dow===0||dow===6;
      const isToday = ds === todayStr;
      const label = `${d.getDate()}`;
      cols.push({ label, days:1, startOff: dayOff(ds), isToday, isWeekend:isWe, monthStart: d.getDate()===1 });
      d.setDate(d.getDate()+1);
    }
  }
  return cols;
}

function getColWidth(cols) {
  const z = ZOOM_LEVELS[zoomIdx];
  if (z.unit === 'day') return 28;
  // Distribute remaining width
  const available = document.getElementById('content').clientWidth - getLeftW();
  const totalDays = cols.reduce((s,c) => s+c.days, 0);
  return Math.max(40, available / cols.length);
}

// ═══════════════════════════════════════
// TIMELINE RENDER
// ═══════════════════════════════════════
function renderTimeline() {
  const el = document.getElementById('content');
  const cols = getColumns();
  const colW = getColWidth(cols);
  const totalW = cols.length * colW;
  const totalColDays = cols.reduce((s,c)=>s+c.days, 0);
  const z = ZOOM_LEVELS[zoomIdx];
  const leftW = getLeftW();
  el.style.setProperty('--left-w', leftW + 'px');

  // Pixel per day
  function pxForDay(off) {
    let px = 0;
    for (const c of cols) {
      if (off < c.startOff + c.days) {
        return px + ((off - c.startOff) / c.days) * colW;
      }
      px += colW;
    }
    return px;
  }

  let html = `<div class="gantt" style="min-width:${leftW+totalW}px">`;

  // Header
  html += `<div class="gantt-header"><div class="gantt-header-left">
    <span style="flex:1">항목</span><span style="font-size:11px;color:#555">담당</span></div>
    <div class="gantt-header-right" style="width:${totalW}px">`;

  if (z.unit === 'day') {
    // Monthly super-header would be nice, but keep it simple — show month markers
    let prevMonth = -1;
    cols.forEach((c, i) => {
      const d = new Date(TL_START); d.setDate(d.getDate() + c.startOff);
      const showMonth = d.getMonth() !== prevMonth;
      prevMonth = d.getMonth();
      const lbl = showMonth ? `${d.getMonth()+1}/${c.label}` : c.label;
      html += `<div class="gantt-col-header ${c.isToday?'today':''} ${c.isWeekend?'weekend':''}" style="width:${colW}px">${lbl}</div>`;
    });
  } else {
    cols.forEach(c => {
      html += `<div class="gantt-col-header ${c.isToday?'today':''}" style="width:${colW}px">${c.label}</div>`;
    });
  }
  html += `</div></div>`;

  // Filtered tasks
  let filtered = tasks;
  if (activeCat) filtered = filtered.filter(t=>t.cat===activeCat);
  if (activeAssignee) filtered = filtered.filter(t=>t.assignee===activeAssignee);

  const cats = activeCat ? [activeCat] : CAT_ORDER;
  cats.forEach(cat => {
    const ct = filtered.filter(t=>t.cat===cat);
    if (!ct.length && !activeCat) { /* still show empty group */ }
    const isC = !!collapsed[cat];
    const dn = ct.filter(t=>t.status==='done').length;

    html += `<div class="gantt-group" data-gcat="${cat}" draggable="true">`;
    html += `<div class="gantt-group-header" data-cat="${cat}">
      <span class="gantt-toggle ${isC?'collapsed':''}">▼</span>
      <div class="gantt-group-color" style="background:${COLORS[cat]}"></div>
      <span class="gantt-group-name">${CAT_NAMES[cat]}</span>
      <span class="gantt-group-info">${dn}/${ct.length}</span>
    </div>`;

    if (!isC) {
      ct.forEach(t => {
        const sOff = dayOff(t.start), eOff = dayOff(t.end);
        const leftPx = pxForDay(sOff);
        const rightPx = pxForDay(eOff);
        const wPx = Math.max(8, rightPx - leftPx);
        const isDone = t.status==='done';
        const bc = barColor(t);

        // Bar label: wide=full range, medium=end date only, narrow=nothing
        const barLabel = wPx > 80 ? `${fmtShort(t.start)}~${fmtShort(t.end)}` : (wPx > 35 ? fmtShort(t.end) : '');

        html += `<div class="gantt-row" data-id="${t.id}" draggable="true">
          <div class="gantt-row-left">
            <div class="gantt-drag-handle" title="드래그하여 순서 변경">⋮⋮</div>
            <div class="gantt-check ${isDone?'done':''}" data-id="${t.id}"></div>
            <span class="gantt-label ${isDone?'done-text':''}" data-id="${t.id}">${t.name}</span>
            ${t.assignee!=='미지정'?`<div class="gantt-assignee-badge" style="background:${aColor(t.assignee)}" title="${t.assignee}">${aInitial(t.assignee)}</div>`:''}
          </div>
          <div class="gantt-row-right" style="width:${totalW}px">
            <div class="gantt-bar ${isDone?'done':''}" data-id="${t.id}" style="left:${leftPx}px;width:${wPx}px;background:${bc}"
                 data-s="${t.start}" data-e="${t.end}" data-n="${t.name}" data-a="${t.assignee}" data-st="${t.status}">
              <div class="resize-handle l"></div>
              ${barLabel}
              <div class="resize-handle r"></div>
            </div>
          </div>
        </div>`;
      });
      html += `<div class="gantt-add-row"><button class="add-btn" data-cat="${cat}">+ 추가</button></div>`;
    }
    html += `</div>`;
  });

  // Today line — centered on today's day position
  const todayOff = dayOff(new Date().toISOString().slice(0,10));
  const todayCol = cols.find(c => todayOff >= c.startOff && todayOff < c.startOff + c.days);
  const dayPxW = todayCol ? colW / todayCol.days : colW;
  const todayPx = pxForDay(todayOff) + dayPxW / 2;
  html += `<div class="gantt-today-line" style="left:${leftW+todayPx}px"></div>`;

  html += `</div>`;
  el.innerHTML = html;
  bindGanttEvents(cols, colW);
}

function bindGanttEvents(cols, colW) {
  const el = document.getElementById('content');
  const tip = document.getElementById('tip');
  const totalW = cols.length * colW;

  function pxForDay(off) {
    let px = 0;
    for (const c of cols) {
      if (off < c.startOff + c.days) { return px + ((off - c.startOff) / c.days) * colW; }
      px += colW;
    }
    return px;
  }
  function dayForPx(px) {
    let acc = 0;
    for (const c of cols) {
      if (px < acc + colW) { return c.startOff + Math.round(((px - acc) / colW) * c.days); }
      acc += colW;
    }
    return TOTAL_DAYS;
  }

  // Toggle
  el.querySelectorAll('.gantt-group-header').forEach(h => {
    h.addEventListener('click', e => {
      e.stopPropagation();
      const cat = h.dataset.cat;
      collapsed[cat] = !collapsed[cat];
      saveCollapsed(); render();
    });
  });

  // Category group drag reorder
  let dragCat = null;
  el.querySelectorAll('.gantt-group[data-gcat]').forEach(grp => {
    grp.addEventListener('dragstart', e => {
      if (e.target.closest('.gantt-row')) { dragCat = null; return; }
      dragCat = grp.dataset.gcat;
      grp.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/cat', dragCat);
    });
    grp.addEventListener('dragend', () => {
      grp.style.opacity = '1';
      el.querySelectorAll('.gantt-group').forEach(g => g.style.borderTop = '');
      dragCat = null;
    });
    grp.addEventListener('dragover', e => {
      if (!dragCat) return;
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.querySelectorAll('.gantt-group').forEach(g => g.style.borderTop = '');
      const rect = grp.getBoundingClientRect();
      if (e.clientY < rect.top + rect.height / 2) grp.style.borderTop = '2px solid #6366f1';
    });
    grp.addEventListener('dragleave', () => { grp.style.borderTop = ''; });
    grp.addEventListener('drop', e => {
      if (!dragCat) return;
      e.preventDefault();
      const targetCat = grp.dataset.gcat;
      if (dragCat === targetCat) return;
      pushUndo();
      const fromIdx = categories.findIndex(c => c.key === dragCat);
      const toIdx = categories.findIndex(c => c.key === targetCat);
      const [moved] = categories.splice(fromIdx, 1);
      const rect = grp.getBoundingClientRect();
      const insertIdx = e.clientY < rect.top + rect.height / 2 ? toIdx : toIdx + 1;
      const adj = insertIdx > fromIdx ? insertIdx - 1 : insertIdx;
      categories.splice(adj, 0, moved);
      rebuildCatMaps();
      saveCategories(); render();
    });
  });

  // Check
  el.querySelectorAll('.gantt-check').forEach(c => {
    c.addEventListener('click', e => {
      e.stopPropagation();
      const t = tasks.find(t=>t.id===+c.dataset.id);
      if(t){pushUndo();t.status=t.status==='done'?'not-started':'done';render();saveTask(t);}
    });
  });

  // Label click → modal
  el.querySelectorAll('.gantt-label').forEach(l => {
    l.addEventListener('click', e => { e.stopPropagation(); openTaskModal(+l.dataset.id); });
  });

  // Add
  el.querySelectorAll('.add-btn').forEach(b => b.addEventListener('click', () => openAddModal(b.dataset.cat)));

  // Bar tooltip + click + drag
  el.querySelectorAll('.gantt-bar').forEach(bar => {
    bar.addEventListener('mouseenter', e => {
      const r = bar.getBoundingClientRect();
      tip.innerHTML = `<div class="tip-title">${bar.dataset.n}</div>
        <div class="tip-row"><b>기간</b> ${fmtFull(bar.dataset.s)} ~ ${fmtFull(bar.dataset.e)}</div>
        <div class="tip-row"><b>담당</b> ${bar.dataset.a}</div>
        <div class="tip-row"><b>상태</b> ${STATUS_KO[bar.dataset.st]}</div>`;
      tip.classList.add('show');
      tip.style.left = Math.min(r.left, window.innerWidth - 270) + 'px';
      tip.style.top = (r.top - tip.offsetHeight - 6) + 'px';
    });
    bar.addEventListener('mouseleave', () => tip.classList.remove('show'));

    // Drag whole bar
    bar.addEventListener('mousedown', e => {
      if (e.target.classList.contains('resize-handle')) return;
      e.preventDefault();
      tip.classList.remove('show');
      const task = tasks.find(t=>t.id===+bar.dataset.id);
      if(!task) return;
      pushUndo();
      const startX = e.clientX, oS = dayOff(task.start), oE = dayOff(task.end), dur = oE-oS;
      let moved = false;
      const onMove = e2 => {
        const dx = e2.clientX - startX;
        if(!moved && Math.abs(dx)<3) return;
        moved = true;
        const area = bar.closest('.gantt-row-right');
        const rect = area.getBoundingClientRect();
        const newStartPx = pxForDay(oS) + dx;
        const newStartDay = Math.max(0, dayForPx(Math.max(0, newStartPx)));
        task.start = offDate(newStartDay);
        task.end = offDate(newStartDay + dur);
        saveTask(task); render();
      };
      const onUp = () => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        if(!moved) openTaskModal(+bar.dataset.id);
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });

  // Drag reorder
  bindDragReorder(el, '.gantt-row');

  // Resize handles
  el.querySelectorAll('.resize-handle').forEach(h => {
    h.addEventListener('mousedown', e => {
      e.stopPropagation(); e.preventDefault();
      tip.classList.remove('show');
      const bar = h.closest('.gantt-bar');
      const task = tasks.find(t=>t.id===+bar.dataset.id);
      if(!task) return;
      pushUndo();
      const isLeft = h.classList.contains('l');
      const startX = e.clientX, oS = dayOff(task.start), oE = dayOff(task.end);
      const onMove = e2 => {
        const dx = e2.clientX - startX;
        if(isLeft) {
          const newPx = pxForDay(oS) + dx;
          const nd = Math.max(0, Math.min(oE-1, dayForPx(Math.max(0,newPx))));
          task.start = offDate(nd);
        } else {
          const newPx = pxForDay(oE) + dx;
          const nd = Math.max(oS+1, dayForPx(Math.max(0,newPx)));
          task.end = offDate(nd);
        }
        saveTask(task); render();
      };
      const onUp = () => { document.removeEventListener('mousemove',onMove); document.removeEventListener('mouseup',onUp); };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    });
  });
}

function renderList() {

        <div class="gantt-check ${isDone?'done':''}" data-id="${t.id}"></div>

        <div class="list-assignee">
          ${t.assignee!=='미지정'?`<div class="sb-avatar" style="background:${aColor(t.assignee)};width:16px;height:16px;font-size:7px">${aInitial(t.assignee)}</div><span>${t.assignee}</span>`:`<span style="color:#bbb">미지정</span>`}
        </div>
        <div class="list-dates">${fmtFull(t.start)} ~ ${fmtFull(t.end)}</div>
        <div class="list-status st-${t.status}">${STATUS_KO[t.status]}</div>
      </div>`;
    });

    if(!isC) html += `<div class="gantt-add-row"><button class="add-btn" data-cat="${cat}">+ 추가</button></div>`;
    html += `</div></div>`;
  });

  el.innerHTML = html;

  el.querySelectorAll('.list-group-header').forEach(h => {
    h.addEventListener('click', () => { collapsed[h.dataset.cat]=!collapsed[h.dataset.cat]; saveCollapsed(); render(); });
  });
  el.querySelectorAll('.gantt-check').forEach(c => {
    c.addEventListener('click', e => { e.stopPropagation(); const t=tasks.find(t=>t.id===+c.dataset.id); if(t){pushUndo();t.status=t.status==='done'?'not-started':'done';render();saveTask(t);} });
  });
  el.querySelectorAll('.list-row').forEach(r => {
    r.addEventListener('click', e => { if(!e.target.classList.contains('gantt-check'))openTaskModal(+r.dataset.id); });
  });
  el.querySelectorAll('.add-btn').forEach(b => b.addEventListener('click', () => openAddModal(b.dataset.cat)));
  bindDragReorder(el, '.list-row');
}

// ═══════════════════════════════════════
// CALENDAR RENDER
// ═══════════════════════════════════════
function renderCalendar() {
  const el = document.getElementById('content');
  const MN = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
  const DOW = ['일','월','화','수','목','금','토'];

  const today = new Date();
  const localDateStr = d => {
    const y = d.getFullYear(), m = String(d.getMonth()+1).padStart(2,'0'), dd = String(d.getDate()).padStart(2,'0');
    return `${y}-${m}-${dd}`;
  };
  const todayStr = localDateStr(today);

  // Filtered tasks
  let filtered = tasks;
  if (activeCat) filtered = filtered.filter(t=>t.cat===activeCat);
  if (activeAssignee) filtered = filtered.filter(t=>t.assignee===activeAssignee);

  // Build week rows
  const firstDay = new Date(calYear, calMonth, 1);
  const lastDay = new Date(calYear, calMonth+1, 0);
  const startDow = firstDay.getDay();
  const daysInMonth = lastDay.getDate();

  const gridStart = new Date(firstDay);
  gridStart.setDate(gridStart.getDate() - startDow);
  const totalCells = Math.ceil((startDow + daysInMonth) / 7) * 7;
  const numWeeks = totalCells / 7;

  // Build array of week date ranges
  const weeks = [];
  const wCursor = new Date(gridStart);
  for (let w = 0; w < numWeeks; w++) {
    const days = [];
    for (let d = 0; d < 7; d++) {
      days.push(localDateStr(wCursor));
      wCursor.setDate(wCursor.getDate() + 1);
    }
    weeks.push(days);
  }

  // Helper: date string to col index within a week (0-6)
  function dateToStr(d) { return d.toISOString ? d.toISOString().slice(0,10) : d; }

  // Sort filtered tasks by start date, then by duration (longer first) for lane packing
  const sortedTasks = [...filtered].sort((a,b) => {
    if (a.start !== b.start) return a.start < b.start ? -1 : 1;
    const durA = (new Date(a.end) - new Date(a.start));
    const durB = (new Date(b.end) - new Date(b.start));
    return durB - durA; // longer tasks first
  });

  // Fixed lane count — rows scroll vertically so we can show more
  const MAX_LANES = 6;

  let html = `<div class="cal-wrap">`;
  // Navigation
  html += `<div class="cal-nav">
    <button class="cal-nav-btn" id="calPrev">‹</button>
    <span class="cal-month">${calYear}년 ${MN[calMonth]}</span>
    <button class="cal-nav-btn" id="calNext">›</button>
    <button class="cal-today-btn" id="calToday">오늘</button>
  </div>`;

  // Calendar table container
  html += `<div class="cal-table">`;

  // Day-of-week header row
  html += `<div class="cal-dow-row">`;
  DOW.forEach((d,i) => {
    html += `<div class="cal-dow ${i===0||i===6?'weekend':''}">${d}</div>`;
  });
  html += `</div>`;

  // Pre-compute lane data per week
  const weekData = weeks.map(weekDays => {
    const weekStart = weekDays[0], weekEnd = weekDays[6];
    const weekTasks = sortedTasks.filter(t => t.start <= weekEnd && t.end >= weekStart);
    const lanes = [];
    const taskLanes = [];
    weekTasks.forEach(t => {
      const visStart = t.start < weekStart ? weekStart : t.start;
      const visEnd = t.end > weekEnd ? weekEnd : t.end;
      const startCol = weekDays.indexOf(visStart);
      const endCol = weekDays.indexOf(visEnd);
      if (startCol < 0 || endCol < 0) return;
      const contLeft = t.start < weekStart;
      const contRight = t.end > weekEnd;
      let lane = -1;
      for (let l = 0; l < lanes.length; l++) { if (lanes[l] < visStart) { lane = l; break; } }
      if (lane === -1) { lane = lanes.length; lanes.push(''); }
      lanes[lane] = visEnd;
      taskLanes.push({ task: t, lane, startCol, endCol, contLeft, contRight });
    });
    const renderLanes = Math.min(lanes.length, MAX_LANES);
    const hasMore = lanes.length > MAX_LANES;
    return { weekDays, renderLanes, hasMore, taskLanes, totalLanes: lanes.length };
  });

  // Calendar body - all weeks with equal row heights
  html += `<div class="cal-body">`;

  weekData.forEach((wd, wi) => {
    const weekDays = wd.weekDays;

    html += `<div class="cal-week-wrap">`;
    // Date number row
    html += `<div class="cal-week">`;
    weekDays.forEach((ds, di) => {
      const dt = new Date(ds + 'T00:00:00');
      const isCurrentMonth = dt.getMonth() === calMonth && dt.getFullYear() === calYear;
      const isToday = ds === todayStr;
      const isWeekend = di === 0 || di === 6;
      let cls = 'cal-day';
      if (!isCurrentMonth) cls += ' other-month';
      if (isToday) cls += ' today';
      if (isWeekend && isCurrentMonth) cls += ' weekend';
      html += `<div class="${cls}" data-date="${ds}"><div class="cal-date">${dt.getDate()}</div></div>`;
    });
    html += `</div>`;

    // Lanes area
    html += `<div class="cal-lanes">`;
    for (let l = 0; l < wd.renderLanes; l++) {
      html += `<div class="cal-event-lane">`;
      wd.taskLanes.filter(tl => tl.lane === l).forEach(tl => {
        const bg = GRADIENTS[tl.task.cat] || COLORS[tl.task.cat];
        const isDone = tl.task.status === 'done';
        let cls = 'cal-bar';
        if (isDone) cls += ' done';
        if (tl.contLeft) cls += ' cont-left';
        if (tl.contRight) cls += ' cont-right';
        const colStart = tl.startCol + 1;
        const colEnd = tl.endCol + 2;
        html += `<div class="${cls}" data-id="${tl.task.id}" style="background:${bg};grid-column:${colStart}/${colEnd}" title="${tl.task.name}">${tl.contLeft ? '' : tl.task.name}</div>`;
      });
      html += `</div>`;
    }

    if (wd.hasMore) {
      html += `<div class="cal-more-row">`;
      for (let d = 0; d < 7; d++) {
        const extra = wd.taskLanes.filter(tl => tl.lane >= MAX_LANES && d >= tl.startCol && d <= tl.endCol).length;
        html += extra > 0 ? `<div class="cal-more" data-date="${weekDays[d]}">+${extra}개</div>` : `<div></div>`;
      }
      html += `</div>`;
    }

    html += `</div>`; // close cal-lanes
    html += `</div>`; // close cal-week-wrap
  });

  html += `</div></div></div>`; // close cal-body, cal-table, cal-wrap
  el.innerHTML = html;

  // Bind events
  document.getElementById('calPrev').addEventListener('click', () => {
    calMonth--;
    if (calMonth < 0) { calMonth = 11; calYear--; }
    render();
  });
  document.getElementById('calNext').addEventListener('click', () => {
    calMonth++;
    if (calMonth > 11) { calMonth = 0; calYear++; }
    render();
  });
  document.getElementById('calToday').addEventListener('click', () => {
    const now = new Date();
    calYear = now.getFullYear();
    calMonth = now.getMonth();
    render();
  });

  // Bar click → open task modal
  el.querySelectorAll('.cal-bar').forEach(b => {
    b.addEventListener('click', e => {
      e.stopPropagation();
      openTaskModal(+b.dataset.id);
    });
  });

  // Day cell click → add task on that date
  el.querySelectorAll('.cal-day').forEach(cell => {
    cell.addEventListener('click', e => {
      if (e.target.closest('.cal-bar') || e.target.classList.contains('cal-more')) return;
      const date = cell.dataset.date;
      if (!date) return;
      openAddModalWithDate(date);
    });
  });
}

// ═══════════════════════════════════════
// DRAG REORDER
// ═══════════════════════════════════════
function bindDragReorder(container, rowSelector) {
  let dragId = null;
  container.querySelectorAll(rowSelector).forEach(row => {
    row.addEventListener('dragstart', e => {
      // Only allow drag from handle (gantt) or anywhere (list)
      dragId = +row.dataset.id;
      row.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', dragId);
    });
    row.addEventListener('dragend', () => {
      row.classList.remove('dragging');
      container.querySelectorAll(rowSelector).forEach(r => {
        r.classList.remove('drag-over-top','drag-over-bottom');
      });
      dragId = null;
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      if(+row.dataset.id === dragId) return;
      const rect = row.getBoundingClientRect();
      const midY = rect.top + rect.height / 2;
      container.querySelectorAll(rowSelector).forEach(r => r.classList.remove('drag-over-top','drag-over-bottom'));
      if (e.clientY < midY) row.classList.add('drag-over-top');
      else row.classList.add('drag-over-bottom');
    });
    row.addEventListener('dragleave', () => {
      row.classList.remove('drag-over-top','drag-over-bottom');
    });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const targetId = +row.dataset.id;
      if(dragId === targetId) return;
      const dragTask = tasks.find(t=>t.id===dragId);
      const targetTask = tasks.find(t=>t.id===targetId);
      if(!dragTask||!targetTask) return;
      // Only allow reorder within same category
      if(dragTask.cat !== targetTask.cat) return;
      pushUndo();

      const rect = row.getBoundingClientRect();
      const after = e.clientY > rect.top + rect.height / 2;

      // Remove drag task from array
      const oldIdx = tasks.indexOf(dragTask);
      tasks.splice(oldIdx, 1);
      // Find new position
      let newIdx = tasks.indexOf(targetTask);
      if(after) newIdx++;
      tasks.splice(newIdx, 0, dragTask);

      saveCategoryOrder(dragTask.cat); render();
    });
  });
}

document.getElementById('mSave').onclick = () => {
  const name = document.getElementById('mName').value.trim(); if(!name)return;
  const d = { name, cat:document.getElementById('mCat').value, assignee:document.getElementById('mAssignee').value,
    start:document.getElementById('mStart').value, end:document.getElementById('mEnd').value,
    status:document.getElementById('mStatus').value, note:document.getElementById('mNote').value,
    cost:parseInt(document.getElementById('mCost').value)||0 };
  pushUndo();
  if(editingTask) { Object.assign(editingTask, d); saveTask(editingTask); } else { const newTask = {id:nextId++,...d}; tasks.push(newTask); saveTask(newTask, true); }
  closeTaskModal();
};

document.getElementById('mDel').onclick = () => {
  if(editingTask&&confirm(`"${editingTask.name}" 삭제?`)){
    pushUndo();
    const delId = editingTask.id; tasks=tasks.filter(t=>t.id!==delId); deleteTask(delId); closeTaskModal();
  }
};

// ═══════════════════════════════════════
// ASSIGNEE MODAL
// ═══════════════════════════════════════
function openAssigneeModal(){ document.getElementById('assigneeModal').classList.add('show'); renderAManage(); }
function closeAssigneeModal(){ document.getElementById('assigneeModal').classList.remove('show'); }
document.getElementById('btnManageAssignees').onclick = openAssigneeModal;
document.getElementById('amClose').onclick = closeAssigneeModal;
document.getElementById('assigneeModal').onclick = e=>{ if(e.target.id==='assigneeModal')closeAssigneeModal(); };

function renderAManage() {
  const el = document.getElementById('aManageList');
  let h = '';
  assignees.forEach(a => {
    if(a==='미지정') return;
    const cnt = tasks.filter(t=>t.assignee===a).length;
    h += `<div style="display:flex;align-items:center;gap:8px;padding:6px 0">
      <div class="sb-avatar" style="background:${aColor(a)}">${aInitial(a)}</div>
      <span style="flex:1;font-size:12px;color:#ccc">${a}</span>
      <span style="font-size:10px;color:#555">${cnt}건</span>
      <button class="btn btn-del btn-sm" data-n="${a}">삭제</button>
    </div>`;
  });
  if(!h) h='<p style="font-size:11px;color:#555;padding:8px 0">등록된 담당자 없음</p>';
  el.innerHTML = h;
  el.querySelectorAll('.btn-del').forEach(b => b.onclick = () => {
    const n=b.dataset.n, cnt=tasks.filter(t=>t.assignee===n).length;
    if(cnt>0&&!confirm(`"${n}" 삭제 시 ${cnt}건이 미지정으로 변경됩니다.`))return;
    pushUndo();
    const affectedTasks = tasks.filter(t=>t.assignee===n);
    affectedTasks.forEach(t=>{t.assignee='미지정';});
    assignees=assignees.filter(x=>x!==n);
    Promise.all(affectedTasks.map(t=>saveTask(t))).then(()=>saveAssignees());
    renderAManage(); render();
  });
}

function addAssignee() {
  const inp=document.getElementById('newAName'), name=inp.value.trim();
  if(!name||assignees.includes(name)){inp.value='';return;}
  pushUndo();
  assignees.push(name); saveAssignees(); inp.value=''; renderAManage(); render();
}
document.getElementById('btnAddA').onclick = e => { e.preventDefault(); addAssignee(); };
document.getElementById('newAName').onkeydown = e=>{ if(e.key==='Enter'){e.preventDefault(); addAssignee();} };


// ═══════════════════════════════════════
// CATEGORY MODAL
// ═══════════════════════════════════════
function openCatModal(){ document.getElementById('catModal').classList.add('show'); renderCatManage(); }
function closeCatModal(){ document.getElementById('catModal').classList.remove('show'); }
document.getElementById('btnManageCats').onclick = openCatModal;
document.getElementById('cmClose').onclick = closeCatModal;
document.getElementById('catModal').onclick = e=>{ if(e.target.id==='catModal')closeCatModal(); };

function renderCatManage() {
  const el = document.getElementById('catManageList');
  let h = '';
  categories.forEach((c, i) => {
    const cnt = tasks.filter(t=>t.cat===c.key).length;
    h += `<div class="cat-manage-row" draggable="true" data-idx="${i}" style="display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid rgba(255,255,255,0.06);cursor:grab">
      <span style="color:#555;font-size:11px;cursor:grab" title="드래그하여 순서 변경">⋮⋮</span>
      <div style="width:12px;height:12px;border-radius:3px;background:${c.color};flex-shrink:0"></div>
      <span style="flex:1;font-size:12px;color:#ccc">${c.name}</span>
      <span style="font-size:10px;color:#555">${cnt}건</span>
      <button class="btn btn-del btn-sm" data-key="${c.key}" title="삭제">삭제</button>
    </div>`;
  });
  if(!h) h='<p style="font-size:11px;color:#555;padding:8px 0">등록된 카테고리 없음</p>';
  el.innerHTML = h;

  // Delete handlers
  el.querySelectorAll('.btn-del').forEach(b => b.onclick = () => {
    const key = b.dataset.key;
    const cnt = tasks.filter(t=>t.cat===key).length;
    if(cnt>0 && !confirm(`"${CAT_NAMES[key]}" 삭제 시 ${cnt}건의 항목도 함께 삭제됩니다.`)) return;
    pushUndo();
    if(cnt>0) {
      const delIds = tasks.filter(t=>t.cat===key).map(t=>t.id);
      tasks = tasks.filter(t=>t.cat!==key);
      delIds.forEach(id => deleteTask(id));
    }
    categories = categories.filter(x=>x.key!==key);
    if(activeCat===key) activeCat=null;
    saveCategories();
    renderCatManage(); render();
  });

  // Drag reorder
  let dragIdx = null;
  el.querySelectorAll('.cat-manage-row').forEach(row => {
    row.addEventListener('dragstart', e => {
      dragIdx = +row.dataset.idx;
      row.style.opacity = '0.4';
      e.dataTransfer.effectAllowed = 'move';
    });
    row.addEventListener('dragend', () => {
      row.style.opacity = '1';
      el.querySelectorAll('.cat-manage-row').forEach(r => r.style.borderTop = '');
      dragIdx = null;
    });
    row.addEventListener('dragover', e => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      el.querySelectorAll('.cat-manage-row').forEach(r => r.style.borderTop = '');
      const rect = row.getBoundingClientRect();
      if(e.clientY < rect.top + rect.height/2) row.style.borderTop = '2px solid #6366f1';
    });
    row.addEventListener('dragleave', () => { row.style.borderTop = ''; });
    row.addEventListener('drop', e => {
      e.preventDefault();
      const targetIdx = +row.dataset.idx;
      if(dragIdx===targetIdx) return;
      pushUndo();
      const [moved] = categories.splice(dragIdx, 1);
      const rect = row.getBoundingClientRect();
      const insertIdx = e.clientY < rect.top + rect.height/2 ? targetIdx : targetIdx + 1;
      const adjusted = insertIdx > dragIdx ? insertIdx - 1 : insertIdx;
      categories.splice(adjusted, 0, moved);
      saveCategories();
      renderCatManage(); render();
    });
  });
}

function addCategory() {
  const inp = document.getElementById('newCatName'), name = inp.value.trim();
  if(!name) return;
  // Generate unique key
  const key = name.toLowerCase().replace(/[^a-z0-9가-힣]/g,'_').replace(/_+/g,'_') + '_' + Date.now();
  if(categories.find(c=>c.name===name)){inp.value='';return;}
  pushUndo();
  // Pick a color not yet used
  const usedColors = categories.map(c=>c.color);
  const color = PALETTE.find(p=>!usedColors.includes(p)) || PALETTE[categories.length % PALETTE.length];
  categories.push({key, name, color});
  saveCategories();
  inp.value='';
  renderCatManage(); render();
}
document.getElementById('btnAddCat').onclick = e => { e.preventDefault(); addCategory(); };
document.getElementById('newCatName').onkeydown = e=>{ if(e.key==='Enter'){e.preventDefault(); addCategory();} };

document.querySelectorAll('.view-btn').forEach(b => b.onclick = () => {

// Scroll wheel zoom
document.getElementById('content').addEventListener('wheel', e => {
  if (e.ctrlKey || e.metaKey) {
    e.preventDefault();
    if (e.deltaY < 0 && zoomIdx < ZOOM_LEVELS.length-1) { zoomIdx++; render(); }
    else if (e.deltaY > 0 && zoomIdx > 0) { zoomIdx--; render(); }
  }
}, { passive: false });

document.getElementById('btnExpandAll').onclick = () => { collapsed={}; saveCollapsed(); render(); };
document.getElementById('btnCollapseAll').onclick = () => { CAT_ORDER.forEach(c=>collapsed[c]=true); saveCollapsed(); render(); };

document.getElementById('btnExport').onclick = () => {
  const totalCost=tasks.reduce((s,t)=>s+(t.cost||0),0);
  const b=new Blob([JSON.stringify({tasks,assignees,totalCost},null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download='glyph_launching_timeline.json';a.click();

// ═══════════════════════════════════════
// SCROLL TO TODAY
// ═══════════════════════════════════════
function scrollToToday() {
  if (currentView !== 'timeline') return;
  const el = document.getElementById('content');
  const cols = getColumns();
  const colW = getColWidth(cols);
  const leftW = getLeftW();
  const todayOff = dayOff(new Date().toISOString().slice(0,10));
  let todayPx = 0;
  for (const c of cols) {
    if (todayOff < c.startOff + c.days) {
      todayPx += ((todayOff - c.startOff) / c.days) * colW;
      break;
    }
    todayPx += colW;
  }
  const viewW = el.clientWidth - leftW;
  el.scrollLeft = Math.max(0, todayPx - viewW * 0.3);
}

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
(async () => {
  await load();
  render();
  requestAnimationFrame(() => scrollToToday());
})();
